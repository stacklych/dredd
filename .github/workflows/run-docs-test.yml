name: run-docs-test

# Documentation validation (Sphinx linkcheck, extension unit tests, and the HTML
# build) only needs to run when the documentation — or this workflow — changes.
# Gating on paths keeps Sphinx (and its external-network linkcheck) off code-only
# pushes, where it adds minutes and a network-flake surface for no benefit.
#
# `commitlint` used to live here; it moved to commitlint.yml so it keeps running
# on every push. Code linting (`yarn lint`) is covered by run-test.yml and is no
# longer duplicated here.
on:
  push:
    paths:
      - 'docs/**'
      - 'package.json' # the docs:* scripts live in the root manifest
      - '.github/workflows/run-docs-test.yml'

jobs:

  quality-checks:

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [22.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    # venv
    - run: pip install -r ./docs/requirements.txt
    - run: echo $(python --version) > .python-version
    - run: 'if [ ! -d ./venv ]; then python -m venv ./venv; fi'
    - run: source $(pwd)/venv/bin/activate

    # install
    - run: yarn install
    - run: yarn docs:lint
    - run: yarn docs:test-extensions

  docs-dry-run:

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [22.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    # venv
    - run: pip install -r ./docs/requirements.txt
    - run: echo $(python --version) > .python-version
    - run: 'if [ ! -d ./venv ]; then python -m venv ./venv; fi'
    - run: source $(pwd)/venv/bin/activate

    - run: yarn install
    - run: yarn docs:build
