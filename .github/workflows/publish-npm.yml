name: publish-npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - run: yarn install --frozen-lockfile

      - name: Publish @stacklych/dredd-transactions
        run: npm publish
        working-directory: packages/dredd-transactions
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @stacklych/dredd
        run: npm publish
        working-directory: packages/dredd
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
