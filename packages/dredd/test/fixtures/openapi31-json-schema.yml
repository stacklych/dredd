openapi: 3.1.0
info:
  title: OpenAPI 3.1 JSON Schema API
  version: '1.0'
paths:
  /resource:
    get:
      responses:
        '404':
          description: Problem details
          content:
            application/json; charset=utf-8:
              schema:
                type: object
                required:
                  - type
                  - title
                  - status
                  - detail
                  - instance
                  - error_code
                  - trace_id
                properties:
                  type:
                    type: string
                    format: uri
                  title:
                    type: string
                  status:
                    type: integer
                    format: int32
                  detail:
                    type: string
                  instance:
                    type: string
                  error_code:
                    type: string
                  trace_id:
                    type: string
                    format: uuid
