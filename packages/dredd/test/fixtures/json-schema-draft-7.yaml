openapi: "3.1.0"
info:
  title: Machines API
  version: "1.0"
paths:
  /machines:
    get:
      responses:
        "200":
          description: OK
          content:
            "application/json; charset=utf-8":
              schema:
                $schema: "http://json-schema.org/draft-07/schema#"
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                      const: bulldozer
                    name:
                      not:
                        type: number
