openapi: "3.0.0"
info:
  title: Top Secret API
  version: "1.0"
paths:
  /resource:
    put:
      summary: Update Resource
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          example: "5229c6e8e4b0bd7dbb07e29c"
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          example: "token 5229c6e8e4b0bd7dbb07e29c"
      requestBody:
        content:
          application/json:
            example:
              token: "5229c6e8e4b0bd7dbb07e29c"
              name: Alice
      responses:
        "200":
          description: OK
          headers:
            Authorization:
              schema:
                type: string
              example: "token 5229c6e8e4b0bd7dbb07e29c"
          content:
            "application/json; charset=utf-8":
              example:
                token: "5229c6e8e4b0bd7dbb07e29c"
                name: Alice
